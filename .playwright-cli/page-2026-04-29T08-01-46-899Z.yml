          - heading "它的可怕，不只来自速度" [level=2] [ref=e116]
          - paragraph [ref=e117]: “绿色地狱”常被联想到树林包围的压迫感，但真正让人敬畏的是组合难度：路窄、起伏大、弯角多、天气变化快， 加上许多地方没有现代赛车场那种一眼看穿的开阔感。你不是在一块平整场地上刷圈，更像被放进一条会呼吸的山地长卷。
